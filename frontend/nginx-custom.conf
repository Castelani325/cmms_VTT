server {
  listen 3000;

  # Redireciona raiz para /Atlas
  location = / {
    return 301 /Atlas;
  }

  # Serve o app React em /Atlas
  location /Atlas {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri $uri/ /Atlas/index.html;
  }

  # Proxy de imagens para o backend (Spring Security libera /images/**)
  location /static/images/ {
    proxy_pass http://api:8080/images/;
  }
}
